name: CI Frontend

on:
  push:
    branches:
      - "**"
    paths:
      - "frontend-crm-agricola/**" # Cambia "front" por el nombre exacto de tu carpeta frontend

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "front/**"

# Define que todos los comandos 'run' se ejecuten dentro de la carpeta del frontend
defaults:
  run:
    working-directory: ./front 

jobs:
  validar:
    name: Validar frontend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Mostrar mensaje en consola
        run: echo "Workflow ejecutado correctamente en el frontend"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint --if-present # --if-present evita errores si el script no existe

      - name: Ejecutar pruebas unitarias
        run: npm run test --if-present

      - name: Construir proyecto
        run: npm run build

  deploy_frontend:
    name: Desplegar frontend en Vercel
    runs-on: ubuntu-latest
    needs: validar

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Preparar proyecto de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Construir proyecto para producción
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Desplegar frontend en producción
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
