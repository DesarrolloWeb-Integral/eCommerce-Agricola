name: First Pull

on:
  pull_request:

jobs:
  Tarea1:
    runs-on: ubuntu-latest

    steps:
      - name: Detalles del Pull Request
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_STATE: ${{ github.event.pull_request.state }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BASE_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
        run: |
          echo "=== INFORMACIÓN DEL PULL REQUEST ==="
          printf 'Título: %s\n' "$PR_TITLE"
          printf 'Contenido (Msg): %s\n' "$PR_BODY"
          printf 'Estado (State): %s\n' "$PR_STATE"
          printf 'Fusionado (Merged): %s\n' "$PR_MERGED"

          echo ""
          echo "=== DATOS DE ORIGEN (De dónde viene) ==="
          printf 'Rama Origen: %s\n' "$PR_HEAD_REF"
          printf 'Commit ID (SHA): %s\n' "$PR_HEAD_SHA"
          printf 'Repo Origen: %s\n' "$PR_HEAD_REPOSITORY"

          echo ""
          echo "=== DATOS DE DESTINO (A dónde va) ==="
          printf 'Rama Destino: %s\n' "$PR_BASE_REF"
          printf 'Repo Destino: %s\n' "$PR_BASE_REPOSITORY"